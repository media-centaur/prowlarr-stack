name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  release-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck + sqlite3
        run: sudo apt-get update && sudo apt-get install -y shellcheck sqlite3

      - name: Run release checks (shellcheck + compose validate + bash tests)
        run: ./scripts/release-checks
